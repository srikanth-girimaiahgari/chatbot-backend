name: Minimal CI/CD Pipeline

on:
  push:
    branches:
      - devops
  pull_request:
    branches:
      - main
      - development

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # SonarQube uses git history for blame/PR decoration.
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: npm audit (find vulnerabilities)
        run: npm audit --audit-level=moderate
        continue-on-error: true

  trivy-file-system-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    needs: build
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      
      - name: Trivy scan (repo filesystem)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
        
        # - name: Run tests
        #   run: npm test
        #   continue-on-error: true

  sonarqube:
    # Run SonarQube scan on a self-hosted runner that can reach your local SonarQube instance.
    # Security: avoid running self-hosted runners for untrusted fork PRs.
    # if: ${{ github.event_name == 'push' }}
    runs-on: self-hosted
    needs: trivy-file-system-scan
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Log Sonar env
        run: |
          echo "${SONAR_HOST_URL}"
          echo "${SONAR_TOKEN}"

      - name: Check SonarQube reachable
        if: ${{ env.SONAR_HOST_URL != '' }}
        run: curl -fsS "${SONAR_HOST_URL}/api/server/version"

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

  Docker-build-and-image-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    needs: sonarqube
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Build Docker image
        run: docker build -t digimaya-backend:${{ github.sha }} .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version \
            --format json \
            --output trivy-image-report.json \
            --exit-code 0 \
            --severity CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN \
            digimaya-backend:${{ github.sha }}

          python3 <<'PY'
          import json
          import sys

          with open('trivy-image-report.json', 'r') as f:
              data = json.load(f)

          counts = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0, "UNKNOWN": 0}
          for result in data.get('Results', []):
              for vuln in result.get('Vulnerabilities', []) or []:
                  sev = vuln.get('Severity', 'UNKNOWN').upper()
                  counts[sev] = counts.get(sev, 0) + 1

          lines = [
              'Severity | Count',
              '---------|------',
          ]
          for sev in ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW', 'UNKNOWN']:
              lines.append(f'{sev:8} | {counts[sev]}')
          summary = '\n'.join(lines)
          print(summary)
          with open('trivy-image-summary.txt', 'w') as f:
              f.write(summary + '\n')

          critical = counts['CRITICAL']
          if critical > 0:
              print(f'\nERROR: {critical} critical vulnerability(ies) found.')
              sys.exit(1)
                    PY
      
      # - name: Deploy to Railway
      #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      #   run: |
      #     curl -X POST https://railway.app/api/v1/deploy \
      #       -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
      #       -H "Content-Type: application/json"