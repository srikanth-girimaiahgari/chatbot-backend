name: Minimal CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - development

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # SonarQube uses git history for blame/PR decoration.
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: npm audit (find vulnerabilities)
        run: npm audit --audit-level=moderate
        continue-on-error: true

  trivy-file-system-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    needs: build
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      
      - name: Trivy scan (repo filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
        
        # - name: Run tests
        #   run: npm test
        #   continue-on-error: true

  sonarqube:
    # Run SonarQube scan on a self-hosted runner that can reach your local SonarQube instance.
    # Security: avoid running self-hosted runners for untrusted fork PRs.
    # if: ${{ github.event_name == 'push' }}
    runs-on: self-hosted
    needs: trivy-file-system-scan
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Log Sonar env
        run: |
          echo "${SONAR_HOST_URL}"
          echo "${SONAR_TOKEN}"

      - name: Check SonarQube reachable
        if: ${{ env.SONAR_HOST_URL != '' }}
        run: curl -fsS "${SONAR_HOST_URL}/api/server/version"

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

  Docker-build-and-image-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      IMAGE_TAG: ${{ github.run_number }}
    needs: sonarqube
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Build Docker image
        run: docker build -t digimaya-backend:${{ env.IMAGE_TAG }} .

      - name: Install Trivy
        run: |
          TRIVY_VERSION=0.70.0
          curl -sfL -o trivy.tar.gz https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz
          tar xzf trivy.tar.gz
          sudo mv trivy /usr/local/bin/
          chmod +x /usr/local/bin/trivy
          trivy --version

      - name: Trivy scan (docker image)
        run: |
          trivy image \
            --format json \
            --output trivy-image-report.json \
            --exit-code 0 \
            --severity CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN \
            digimaya-backend:${{ env.IMAGE_TAG }}

          trivy image \
            --format table \
            --output trivy-image-table.txt \
            --exit-code 0 \
            --severity CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN \
            digimaya-backend:${{ env.IMAGE_TAG }}

          cat trivy-image-table.txt

          python3 <<'PY'
          import json
          import sys

          with open('trivy-image-report.json', 'r') as f:
              data = json.load(f)

          counts = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0, "UNKNOWN": 0}
          for result in data.get('Results', []):
              for vuln in result.get('Vulnerabilities', []) or []:
                  sev = vuln.get('Severity', 'UNKNOWN').upper()
                  counts[sev] = counts.get(sev, 0) + 1

          print('Severity | Count')
          print('---------|------')
          for sev in ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW', 'UNKNOWN']:
              print(f'{sev:8} | {counts[sev]}')

          with open('trivy-image-summary.txt', 'w') as f:
              f.write('Severity | Count\n')
              f.write('---------|------\n')
              for sev in ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW', 'UNKNOWN']:
                  f.write(f'{sev:8} | {counts[sev]}\n')

          critical = counts['CRITICAL']
          if critical > 0:
              print(f'\nERROR: {critical} critical vulnerability(ies) found.')
              sys.exit(1)
          PY

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v7.0.1
        with:
          name: trivy-image-reports
          path: |
            trivy-image-report.json
            trivy-image-table.txt
            trivy-image-summary.txt