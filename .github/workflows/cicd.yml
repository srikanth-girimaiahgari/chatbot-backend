name: Minimal CI/CD Pipeline

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # SonarQube uses git history for blame/PR decoration.
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: npm audit (find vulnerabilities)
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Trivy scan (repo filesystem)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
      
      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Build Docker image
        run: docker build -t digimaya-backend:${{ github.sha }} .

      - name: Trivy scan (docker image)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'digimaya-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      
      # - name: Deploy to Railway
      #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      #   run: |
      #     curl -X POST https://railway.app/api/v1/deploy \
      #       -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
      #       -H "Content-Type: application/json"

  sonarqube:
    # Run SonarQube scan on a self-hosted runner that can reach your local SonarQube instance.
    # Security: avoid running self-hosted runners for untrusted fork PRs.
    if: ${{ github.event_name == 'push' }}
    runs-on: self-hosted
    env:
      # GitHub Actions does not allow referencing the `secrets` context in `if:` expressions.
      # Workaround: map secrets to env and then reference `env.*` in conditionals.
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check SonarQube reachable
        if: ${{ env.SONAR_HOST_URL != '' }}
        run: curl -fsS "${SONAR_HOST_URL}/api/server/version"

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            "-Dsonar.projectKey=chatbox-backend-1"
            "-Dsonar.projectName=DigiMaya"
